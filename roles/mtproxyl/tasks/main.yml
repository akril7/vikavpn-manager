- name: Copy install script
  copy:
    src: install.sh
    dest: /tmp/mtproxyl-install.sh
    mode: "0755"

- name: Install MTProxyL
  command:
    cmd: bash /tmp/mtproxyl-install.sh
    creates: /opt/mtproxyl

- name: Get fake_cert_len
  shell: |
    echo | openssl s_client \
      -connect {{ mtproxyl.fake_tls_domain }}:443 \
      -servername {{ mtproxyl.fake_tls_domain }} 2>/dev/null \
    | openssl x509 -outform der | wc -c
  register: cert_len
  changed_when: false

- set_fact:
    fake_cert_len: "{{ cert_len.stdout | int }}"

- name: Copy configs
  template:
    src: "{{ item }}.j2"
    dest: "/opt/mtproxyl/{{ item }}"
    mode: "0644"
  loop:
    - 'secrets.conf'
    - 'settings.conf'
  notify: Restart mtproxyl

- name: Apply By-MEKO sysctl tuning
  sysctl:
    name: "{{ item.key }}"
    value: "{{ item.value }}"
    state: present
    reload: true
  loop: "{{ mtproxyl_sysctl | dict2items }}"
