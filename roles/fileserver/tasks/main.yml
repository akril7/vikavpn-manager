- name: Install nginx
  apt:
    name: nginx
    state: present

- name: Enable nginx
  systemd:
    name: nginx
    enabled: true
    state: started

- name: Create directory
  file:
    path: "{{ fileserver.dir }}"
    state: directory
    mode: "0755"

- name: Copy config
  template:
    src: nginx.conf.j2
    dest: "/etc/nginx/sites-available/fileserver.conf"
    mode: "0644"
  notify: Reload nginx

- name: Enable site
  file:
    src: "/etc/nginx/sites-available/fileserver.conf"
    dest: "/etc/nginx/sites-enabled/fileserver.conf"
    state: link
  notify: Reload nginx
